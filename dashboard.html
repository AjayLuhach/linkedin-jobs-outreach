<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed Email Extractor — Dashboard</title>
<link rel="stylesheet" href="/dashboard.css">
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Feed Email Extractor</h1>
    <p id="subtitle">Loading...</p>
  </div>

  <div class="user-tabs" id="userTabs"></div>
  <div class="stats" id="stats"></div>

  <div class="filters" id="filters"></div>

  <div class="results-row">
    <div class="results-count" id="resultsCount"></div>
    <button class="send-all-btn" id="sendAllBtn" title="Send all approved emails">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
        <path d="M2 10l7-7m0 0l7 7m-7-7v14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="rotate(90 10 10)"/>
      </svg>
      Send All
    </button>
  </div>
  <div class="cards" id="cards">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Loading emails from sheet...</p>
    </div>
  </div>
</div>

<div class="send-panel" id="sendPanel">
  <div class="send-panel-header">
    <span>Sending Emails</span>
    <div class="send-panel-header-btns">
      <button class="send-panel-btn" id="sendPanelMinimize" title="Minimize">&minus;</button>
      <button class="send-panel-btn" id="sendPanelMaximize" title="Maximize" style="display:none">&#43;</button>
    </div>
  </div>
  <div class="send-panel-log" id="sendLog"></div>
</div>

<button class="refresh-btn" id="refreshBtn" title="Refresh data from sheet">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
    <path d="M17 10a7 7 0 01-12.9 3.7M3 10a7 7 0 0112.9-3.7M17 10V4m0 6h-6M3 10v6m0-6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<script>
(() => {
  // ── State ──
  let allData = {};          // { username: [emails] }
  let postsData = [];        // raw posts from Posts tab
  let users = [];
  let configUser = '';       // configured sender from config (e.g. "Sonam")
  let activeUser = null;     // null = "All Users"
  let postsView = false;     // true = showing Posts tab
  let activeFilter = 'all';
  let postsStatusFilter = 'hiring'; // 'all', 'hiring', 'skipped'
  let jobTypeFilter = '';
  let salaryFilter = '';
  let contactMethodFilter = ''; // '', 'email', 'dm'
  let searchQuery = '';

  // ── Helpers ──
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function scoreClass(score) {
    if (score >= 8) return 'score-high';
    if (score >= 5) return 'score-mid';
    return 'score-low';
  }

  function statusBadge(status) {
    const s = (status || '').toLowerCase();
    if (s === 'sent') return '<span class="badge badge-sent">Sent</span>';
    if (s === 'approved') return '<span class="badge badge-approved">Approved</span>';
    if (s === 'rejected') return '<span class="badge badge-rejected">Rejected</span>';
    if (s === 'no_email') return '<span class="badge badge-no-email">No Email</span>';
    return '<span class="badge badge-drafted">Drafted</span>';
  }

  function postUrl(postId) {
    return postId ? `https://www.linkedin.com/feed/update/urn:li:activity:${postId}/` : null;
  }

  function findPost(postId) {
    return postId ? postsData.find(p => p.postId === postId) : null;
  }

  function getActiveEmails() {
    if (activeUser) return (allData[activeUser] || []).map(e => ({ ...e, _user: activeUser }));
    // All users merged
    const all = [];
    for (const [user, emails] of Object.entries(allData)) {
      for (const e of emails) all.push({ ...e, _user: user });
    }
    return all;
  }

  function parseSalaryToLPA(sal) {
    if (!sal) return null;
    const s = sal.toLowerCase().replace(/,/g, '');
    // "8 LPA", "8L", "6-10 LPA"
    let m = s.match(/([\d.]+)\s*(?:-\s*[\d.]+\s*)?(?:lpa|lakhs?\s*per\s*annum|l\b)/);
    if (m) return parseFloat(m[1]);
    // "60 LPM" (lakhs per month)
    m = s.match(/([\d.]+)\s*lpm/);
    if (m) return parseFloat(m[1]) * 12;
    // ₹ amounts (Indian Rupees)
    m = sal.match(/₹\s*([\d,]+)/);
    if (m) {
      const amt = parseFloat(m[1].replace(/,/g, ''));
      return amt >= 100000 ? amt / 100000 : (amt * 12) / 100000;
    }
    // $X/hr
    m = s.match(/\$\s*([\d.]+)\s*(?:\/\s*)?(?:hr|hour)/);
    if (m) return (parseFloat(m[1]) * 2080 * 85) / 100000;
    // $XK/yr
    m = s.match(/\$\s*([\d.]+)\s*k?\s*(?:\/\s*)?(?:yr|year|annual)/);
    if (m) { let v = parseFloat(m[1]); if (v < 1000) v *= 1000; return (v * 85) / 100000; }
    // Fallback: plain number — if < 200 treat as LPA, else monthly INR
    m = s.match(/([\d.]+)/);
    if (m) { const v = parseFloat(m[1]); return v < 200 ? v : (v * 12) / 100000; }
    return null;
  }

  function matchesFilter(e) {
    const status = (e.status || 'drafted').toLowerCase();
    // Hide rejected from "all" unless filter is "rejected"
    if (status === 'rejected' && activeFilter !== 'rejected' && activeFilter !== 'all') return false;
    if (activeFilter !== 'all' && status !== activeFilter) return false;
    if (jobTypeFilter && (e.job?.type || '').toLowerCase() !== jobTypeFilter) return false;
    if (contactMethodFilter) {
      const hasEmail = e.email?.to && e.email.to.includes('@');
      if (contactMethodFilter === 'email' && !hasEmail) return false;
      if (contactMethodFilter === 'dm' && hasEmail) return false;
    }
    if (salaryFilter) {
      const sal = (e.job?.salary || '').trim();
      if (salaryFilter === 'unknown') {
        if (sal) return false;
      } else {
        if (!sal) return false;
        const lpa = parseSalaryToLPA(sal);
        if (lpa === null || lpa < parseFloat(salaryFilter)) return false;
      }
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const haystack = [
        e.poster?.name, e.poster?.headline,
        e.job?.title, e.job?.company, e.job?.type,
        e.email?.to, e.email?.subject,
        e.matchReason, e.requirements, e._user, e.postSummary,
      ].filter(Boolean).join(' ').toLowerCase();
      return haystack.includes(q);
    }
    return true;
  }

  // ── Fetch Data ──
  async function fetchData() {
    const [emailsRes, postsRes] = await Promise.all([
      fetch('/api/emails/all'),
      fetch('/api/posts'),
    ]);
    const emailsData = await emailsRes.json();
    const postsJson = await postsRes.json();
    allData = emailsData.users || {};
    postsData = postsJson.posts || [];
    users = Object.keys(allData).sort();
  }

  // ── Render User Tabs ──
  function renderUserTabs() {
    const totalAll = Object.values(allData).reduce((s, e) => s + e.length, 0);
    let html = `<button class="user-tab ${postsView ? 'active' : ''}" data-view="posts">Posts<span class="tab-count">${postsData.length}</span></button>`;
    html += `<button class="user-tab ${!postsView && !activeUser ? 'active' : ''}" data-user="">All Users<span class="tab-count">${totalAll}</span></button>`;
    for (const user of users) {
      const count = (allData[user] || []).length;
      html += `<button class="user-tab ${!postsView && activeUser === user ? 'active' : ''}" data-user="${escapeHtml(user)}">${escapeHtml(user)}<span class="tab-count">${count}</span></button>`;
    }
    document.getElementById('userTabs').innerHTML = html;

    document.querySelectorAll('.user-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.view === 'posts') {
          postsView = true;
          activeUser = null;
        } else {
          postsView = false;
          activeUser = btn.dataset.user || null;
        }
        renderUserTabs();
        renderFilters();
        renderStats();
        renderCards();
      });
    });
  }

  // ── Render Stats ──
  function renderStats() {
    if (postsView) {
      const total = postsData.length;
      const hiring = postsData.filter(p => p.status !== 'skipped').length;
      const skipped = postsData.filter(p => p.status === 'skipped').length;
      const withEmail = postsData.filter(p => p.contacts?.method === 'email').length;
      const dmOnly = postsData.filter(p => p.contacts?.method === 'DM').length;

      document.getElementById('stats').innerHTML = `
        <div class="stat-card">
          <div class="stat-number" style="color:var(--accent)">${total}</div>
          <div class="stat-label">Total Posts</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" style="color:var(--green)">${hiring}</div>
          <div class="stat-label">Hiring</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" style="color:var(--red)">${skipped}</div>
          <div class="stat-label">Skipped</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" style="color:var(--cyan)">${withEmail}</div>
          <div class="stat-label">Has Email</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" style="color:var(--yellow)">${dmOnly}</div>
          <div class="stat-label">DM Only</div>
        </div>
      `;
      document.getElementById('subtitle').textContent = `${total} posts in shared pool`;
      return;
    }

    const emails = getActiveEmails();
    const total = emails.length;
    const drafted = emails.filter(e => (e.status || 'drafted') === 'drafted').length;
    const approved = emails.filter(e => e.status === 'approved').length;
    const sent = emails.filter(e => e.status === 'sent').length;
    const rejected = emails.filter(e => e.status === 'rejected').length;
    const avgScore = total ? (emails.reduce((s, e) => s + (e.score || 0), 0) / total).toFixed(1) : '0';

    document.getElementById('stats').innerHTML = `
      <div class="stat-card">
        <div class="stat-number" style="color:var(--accent)">${total}</div>
        <div class="stat-label">Total Emails</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="color:var(--pink)">${drafted}</div>
        <div class="stat-label">Drafted</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="color:var(--cyan)">${approved}</div>
        <div class="stat-label">Approved</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="color:var(--green)">${sent}</div>
        <div class="stat-label">Sent</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="color:var(--red)">${rejected}</div>
        <div class="stat-label">Rejected</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="color:var(--yellow)">${avgScore}</div>
        <div class="stat-label">Avg Score</div>
      </div>
    `;

    const label = activeUser || 'All users';
    document.getElementById('subtitle').textContent = `${total} emails for ${label}`;
  }

  // ── Render Cards ──
  function bestStatus(entries) {
    const order = ['approved', 'drafted', 'sent', 'no_email', 'rejected'];
    for (const s of order) {
      if (entries.some(e => (e.status || 'drafted') === s)) return s;
    }
    return 'drafted';
  }

  // ── Posts filtering ──
  function matchesPostFilter(p) {
    if (postsStatusFilter !== 'all' && p.status !== postsStatusFilter) return false;
    if (jobTypeFilter && (p.job?.type || '').toLowerCase() !== jobTypeFilter) return false;
    if (contactMethodFilter) {
      const method = (p.contacts?.method || '').toLowerCase();
      if (contactMethodFilter === 'email' && method !== 'email') return false;
      if (contactMethodFilter === 'dm' && method !== 'dm') return false;
    }
    if (salaryFilter) {
      const sal = (p.job?.salary || '').trim();
      if (salaryFilter === 'unknown') {
        if (sal) return false;
      } else {
        if (!sal) return false;
        const lpa = parseSalaryToLPA(sal);
        if (lpa === null || lpa < parseFloat(salaryFilter)) return false;
      }
    }
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const haystack = [
        p.poster?.name, p.poster?.headline,
        p.job?.title, p.job?.company, p.job?.type,
        p.summary, (p.job?.requirements || []).join(' '),
        (p.contacts?.emails || []).join(' '),
      ].filter(Boolean).join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  }

  // ── Render post card ──
  function renderPostCard(p) {
    const isSkipped = p.status === 'skipped';
    const reqs = (p.job?.requirements || []);
    const contactEmails = (p.contacts?.emails || []);
    const salaryLPA = p.job?.salary ? parseSalaryToLPA(p.job.salary) : null;

    return `
    <div class="card${isSkipped ? ' rejected-card' : ''}" data-postid="${escapeHtml(p.postId)}">
      <div class="card-top" onclick="this.parentElement.classList.toggle('expanded')">
        <div class="score-ring ${p.contacts?.method === 'email' ? 'score-high' : 'score-low'}" style="font-size:0.65rem">${p.contacts?.method === 'email' ? 'Email' : 'DM'}</div>
        <div class="card-info">
          <h3>${escapeHtml(p.poster?.name || 'Unknown')}</h3>
          <div class="role">${escapeHtml(p.job?.title || 'Unknown Role')}${p.job?.company ? ' @ ' + escapeHtml(p.job.company) : ''}</div>
          <div class="reason">${escapeHtml(p.summary || '').substring(0, 120)}${(p.summary || '').length > 120 ? '...' : ''}</div>
        </div>
        <div class="card-badges">
          ${p.contacts?.method === 'email'
            ? `<span class="badge" style="background:var(--green-dim);color:var(--green);border:1px solid #34d39944">Email</span>`
            : `<span class="badge" style="background:var(--yellow-dim);color:var(--yellow);border:1px solid #fbbf2444">DM Only</span>`}
          ${p.job?.type ? `<span class="badge" style="background:var(--cyan-dim);color:var(--cyan);border:1px solid #22d3ee44">${escapeHtml(p.job.type)}</span>` : ''}
          ${p.job?.salary ? `<span class="badge" style="background:var(--green-dim);color:var(--green);border:1px solid #34d39944">${escapeHtml(p.job.salary)}${salaryLPA !== null ? ' (~' + salaryLPA.toFixed(1) + ' LPA)' : ''}</span>` : ''}
          ${isSkipped
            ? `<span class="badge" style="background:var(--red-dim);color:var(--red);border:1px solid #f8717144">Skipped</span>`
            : `<span class="badge" style="background:var(--green-dim);color:var(--green);border:1px solid #34d39944">Hiring</span>`}
        </div>
        ${!isSkipped
          ? `<button class="btn-reject" style="padding:4px 14px;font-size:0.75rem;white-space:nowrap" onclick="event.stopPropagation();handleSkipPost(event, '${escapeHtml(p.postId)}')">Skip</button>`
          : `<button class="btn-restore" style="padding:4px 14px;font-size:0.75rem;white-space:nowrap" onclick="event.stopPropagation();handleRestorePost(event, '${escapeHtml(p.postId)}')">Restore</button>`}
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-detail">
        <div class="detail-grid">
          <div class="detail-section">
            <h4>Job Details</h4>
            <div class="detail-row"><span class="label">Title</span><span class="value">${escapeHtml(p.job?.title || '—')}</span></div>
            <div class="detail-row"><span class="label">Company</span><span class="value">${escapeHtml(p.job?.company || '—')}</span></div>
            ${p.job?.type ? `<div class="detail-row"><span class="label">Type</span><span class="value" style="color:var(--cyan)">${escapeHtml(p.job.type)}</span></div>` : ''}
            ${p.job?.requiredExperience != null ? `<div class="detail-row"><span class="label">Experience</span><span class="value">${p.job.requiredExperience} yr</span></div>` : ''}
            ${p.job?.salary ? `<div class="detail-row"><span class="label">Salary</span><span class="value" style="color:var(--green)">${escapeHtml(p.job.salary)}${salaryLPA !== null ? ' (~' + salaryLPA.toFixed(1) + ' LPA)' : ''}</span></div>` : ''}
            ${p.job?.location ? `<div class="detail-row"><span class="label">Location</span><span class="value">${escapeHtml(p.job.location)}</span></div>` : ''}
            <div class="detail-row"><span class="label">Poster</span><span class="value">${escapeHtml(p.poster?.headline || '—')}</span></div>
            ${reqs.length ? `<div style="margin-top:8px"><div class="reqs">${reqs.map(r => `<span class="req-tag">${escapeHtml(r)}</span>`).join('')}</div></div>` : ''}
          </div>
          <div class="detail-section">
            <h4>Contact</h4>
            <div class="detail-row"><span class="label">Method</span><span class="value" style="color:${p.contacts?.method === 'email' ? 'var(--green)' : 'var(--yellow)'}">${p.contacts?.method === 'email' ? 'Email' : 'DM only'}</span></div>
            ${contactEmails.length ? `<div class="detail-row"><span class="label">Email(s)</span><span class="value" style="color:var(--cyan);font-family:JetBrains Mono,monospace;font-size:0.8rem">${contactEmails.map(e => escapeHtml(e)).join(', ')}</span></div>` : ''}
            <div class="detail-row"><span class="label">Added By</span><span class="value">${escapeHtml(p.addedBy || '—')}</span></div>
            ${p.addedAt ? `<div class="detail-row"><span class="label">Added</span><span class="value">${new Date(p.addedAt).toLocaleString()}</span></div>` : ''}
            <div class="detail-row"><span class="label">Post</span><span class="value">${p.postId ? `<a href="${postUrl(p.postId)}" target="_blank" rel="noopener" style="color:var(--cyan);text-decoration:none;font-family:JetBrains Mono,monospace;font-size:0.75rem" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">View on LinkedIn</a>` : '—'}</span></div>
          </div>
          ${p.summary ? `<div class="post-summary"><h4>Post Summary</h4><p>${escapeHtml(p.summary)}</p></div>` : ''}
          ${p.postText ? `<div class="post-summary" style="grid-column:1/-1"><h4>Original Post</h4><p style="white-space:pre-wrap;font-size:0.82rem;line-height:1.55;max-height:300px;overflow-y:auto">${escapeHtml(p.postText)}</p></div>` : ''}
        </div>
      </div>
    </div>`;
  }

  function renderCards() {
    // Show Send All only on approved filter (non-posts view)
    const sendBtn = document.getElementById('sendAllBtn');
    sendBtn.style.display =
      (!postsView && activeFilter === 'approved') ? '' : 'none';
    if (!sendBtn.disabled && configUser) {
      const count = (allData[configUser] || []).filter(e => e.status === 'approved' && !e.sentAt).length;
      sendBtn.textContent = `→ Send All (${configUser}: ${count})`;
    }

    // Posts view
    if (postsView) {
      const filtered = postsData.filter(matchesPostFilter);
      if (filtered.length === 0) {
        document.getElementById('resultsCount').textContent = `0 of ${postsData.length} posts`;
        document.getElementById('cards').innerHTML = `
          <div class="empty">
            <div class="empty-icon">&#9788;</div>
            <p>No posts match your filters</p>
          </div>`;
        return;
      }
      // Sort: hiring first, then by date (newest first)
      filtered.sort((a, b) => {
        if (a.status === 'skipped' && b.status !== 'skipped') return 1;
        if (a.status !== 'skipped' && b.status === 'skipped') return -1;
        return (b.addedAt || '').localeCompare(a.addedAt || '');
      });
      document.getElementById('resultsCount').textContent = `${filtered.length} of ${postsData.length} posts`;
      document.getElementById('cards').innerHTML = filtered.map(renderPostCard).join('');
      return;
    }

    // Emails view
    const emails = getActiveEmails().filter(matchesFilter);

    const total = getActiveEmails().length;

    if (emails.length === 0) {
      document.getElementById('resultsCount').textContent = `0 of ${total} emails`;
      document.getElementById('cards').innerHTML = `
        <div class="empty">
          <div class="empty-icon">&#9788;</div>
          <p>No emails match your filters</p>
        </div>`;
      return;
    }

    // When showing all users, group by post ID — one card per post with all users' drafts inside
    if (!activeUser && users.length > 1) {
      const byPost = new Map();
      for (const e of emails) {
        const pid = e.postId || '';
        if (!byPost.has(pid)) byPost.set(pid, []);
        byPost.get(pid).push(e);
      }

      // Sort posts: best status first, then highest score
      const statusOrder = { drafted: 0, approved: 1, sent: 2, rejected: 3, no_email: 4 };
      const posts = [...byPost.entries()].sort((a, b) => {
        const sa = statusOrder[bestStatus(a[1])] ?? 5;
        const sb = statusOrder[bestStatus(b[1])] ?? 5;
        if (sa !== sb) return sa - sb;
        const maxA = Math.max(...a[1].map(e => e.score || 0));
        const maxB = Math.max(...b[1].map(e => e.score || 0));
        return maxB - maxA;
      });

      document.getElementById('resultsCount').textContent = `${posts.length} posts (${emails.length} emails across ${users.length} users)`;
      document.getElementById('cards').innerHTML = posts.map(([pid, entries]) => renderGroupedCard(pid, entries)).join('');
      return;
    }

    // Single user view — one card per email, sorted by status then score
    const statusOrder = { drafted: 0, approved: 1, sent: 2, rejected: 3, no_email: 4 };
    emails.sort((a, b) => {
      const sa = statusOrder[(a.status || 'drafted')] ?? 5;
      const sb = statusOrder[(b.status || 'drafted')] ?? 5;
      if (sa !== sb) return sa - sb;
      return (b.score || 0) - (a.score || 0);
    });

    document.getElementById('resultsCount').textContent = `${emails.length} of ${total} emails`;
    document.getElementById('cards').innerHTML = emails.map(renderSingleCard).join('');
  }

  // Card for "All Users" view — one card per post, multiple user drafts inside
  function renderGroupedCard(postId, entries) {
    const first = entries[0];
    const maxScore = Math.max(...entries.map(e => e.score || 0));
    const reqs = (first.requirements || '').split(',').map(s => s.trim()).filter(Boolean);
    const allRejected = entries.every(e => (e.status || 'drafted') === 'rejected');

    // Status summary badges
    const statuses = {};
    for (const e of entries) { const s = e.status || 'drafted'; statuses[s] = (statuses[s] || 0) + 1; }

    return `
    <div class="card${allRejected ? ' rejected-card' : ''}" data-postid="${escapeHtml(postId)}">
      <div class="card-top" onclick="this.parentElement.classList.toggle('expanded')">
        <div class="score-ring ${scoreClass(maxScore)}">${maxScore}</div>
        <div class="card-info">
          <h3>${escapeHtml(first.poster?.name || 'Unknown')}</h3>
          <div class="role">${escapeHtml(first.job?.title || 'Unknown Role')}${first.job?.company ? ' @ ' + escapeHtml(first.job.company) : ''}</div>
          <div class="reason">${escapeHtml(first.matchReason || '')}</div>
        </div>
        <div class="card-badges">

  // ── In-place DOM update helpers ──
  function updateCardStatusInPlace(btn, user, postId, newStatus) {
    const cardEl = btn.closest('.card');
    const previewEl = btn.closest('.email-preview');
    const now = new Date();

    // Update status badge in card-top (single card view)
    if (cardEl) {
      const cardBadges = cardEl.querySelector('.card-top .card-badges');
      if (cardBadges) {
        const oldBadge = cardBadges.querySelector('.badge:not(.badge-user)');
        if (oldBadge) oldBadge.outerHTML = statusBadge(newStatus);
      }
      // Update rejected-card opacity
      if (newStatus === 'rejected') cardEl.classList.add('rejected-card');
      else cardEl.classList.remove('rejected-card');
    }

    // Update status badge inside email-preview header (grouped view)
    if (previewEl) {
      const headerDiv = previewEl.children[0];
      if (headerDiv) {
        const oldBadge = headerDiv.querySelector('.badge:not(.badge-user)');
        if (oldBadge) oldBadge.outerHTML = statusBadge(newStatus);
      }
    }

    // Rebuild the action area
    const actionDiv = btn.closest('.email-actions');
    if (!actionDiv) return;

    const eu = escapeHtml(user);
    const ep = escapeHtml(postId);

    // Check if this email preview has an email (to show Edit button)
    const hasEditBtn = previewEl && previewEl.querySelector('.email-display');

    if (newStatus === 'approved') {
      actionDiv.innerHTML = `
        ${hasEditBtn ? `<button class="btn-edit" onclick="handleEdit(event, '${eu}', '${ep}')">Edit</button>` : ''}
        <button class="btn-approve is-approved" onclick="handleApprove(event, '${eu}', '${ep}', true)">Unapprove</button>
        <button class="btn-reject" onclick="handleReject(event, '${eu}', '${ep}')">Reject</button>
        <span style="color:var(--cyan);font-size:0.75rem;margin-left:auto;font-family:JetBrains Mono,monospace">Approved: ${now.toLocaleString()}</span>
      `;
    } else if (newStatus === 'rejected') {
      actionDiv.innerHTML = `
        <button class="btn-restore" onclick="handleRestore(event, '${eu}', '${ep}')">Restore</button>
        <span style="color:var(--red);font-size:0.75rem;margin-left:auto;font-family:JetBrains Mono,monospace">Rejected: ${now.toLocaleString()}</span>
      `;
    } else {
      // drafted
      actionDiv.innerHTML = `
        ${hasEditBtn ? `<button class="btn-edit" onclick="handleEdit(event, '${eu}', '${ep}')">Edit</button>` : ''}
        <button class="btn-approve" onclick="handleApprove(event, '${eu}', '${ep}', false)">Approve</button>
        <button class="btn-reject" onclick="handleReject(event, '${eu}', '${ep}')">Reject</button>
      `;
    }
  }

  // ── API Actions ──
  window.handleApprove = async function(event, user, postId, isCurrentlyApproved) {
    event.stopPropagation();
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = '...';

    try {
      const endpoint = isCurrentlyApproved ? '/api/unapprove' : '/api/approve';
      const body = isCurrentlyApproved
        ? { user, postId }
        : { user, postId, approvedBy: 'Dashboard' };
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      const newStatus = isCurrentlyApproved ? 'drafted' : 'approved';

      // Update local state
      const emailObj = (allData[user] || []).find(e => e.postId === postId);
      if (emailObj) {
        emailObj.status = newStatus;
        emailObj.approvedBy = isCurrentlyApproved ? '' : 'Dashboard';
      }

      // Update stats/tabs but keep cards in place
      renderStats();
      renderUserTabs();

      // In-place card update
      updateCardStatusInPlace(btn, user, postId, newStatus);
    } catch (err) {
      alert('Failed: ' + err.message);
      btn.disabled = false;
      btn.textContent = isCurrentlyApproved ? 'Unapprove' : 'Approve';
    }
  };

    event.stopPropagation();
    const btn = event.target;

      btn.textContent = 'Reject';

  // ── Edit Email ──
  window.handleEdit = function(event, user, postId) {
    event.stopPropagation();
    const previewEl = event.target.closest('.email-preview');
    if (!previewEl) return;

    const emailObj = (allData[user] || []).find(e => e.postId === postId);
    if (!emailObj || !emailObj.email) return;

    const displayEl = previewEl.querySelector('.email-display');
    if (!displayEl) return;

    // Hide the display and show edit form
    displayEl.style.display = 'none';

    // Hide action buttons while editing
    const actionDiv = previewEl.querySelector('.email-actions');
    if (actionDiv) actionDiv.style.display = 'none';

    const editForm = document.createElement('div');
    editForm.className = 'edit-form';
    editForm.innerHTML = `
      <label>Subject</label>
      <input type="text" class="edit-subject" value="${escapeHtml(emailObj.email.subject || '')}">
      <label>Body</label>
      <textarea class="edit-body">${escapeHtml(emailObj.email.body || '')}</textarea>
      <div class="edit-actions">
        <button class="btn-save" onclick="handleSaveEdit(event, '${escapeHtml(user)}', '${escapeHtml(postId)}')">Save</button>
        <button class="btn-cancel-edit" onclick="handleCancelEdit(event)">Cancel</button>
      </div>
    `;
    displayEl.insertAdjacentElement('afterend', editForm);
  };

  window.handleCancelEdit = function(event) {
    event.stopPropagation();
    const editForm = event.target.closest('.edit-form');
    const previewEl = editForm.closest('.email-preview');
    const displayEl = previewEl.querySelector('.email-display');
    const actionDiv = previewEl.querySelector('.email-actions');

    editForm.remove();
    displayEl.style.display = '';
    if (actionDiv) actionDiv.style.display = '';
  };

  window.handleSaveEdit = async function(event, user, postId) {
    event.stopPropagation();
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = 'Saving...';

    const editForm = btn.closest('.edit-form');
    const subject = editForm.querySelector('.edit-subject').value;
    const body = editForm.querySelector('.edit-body').value;

    try {
      const res = await fetch('/api/emails/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user, postId, subject, body }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      // Update local state (preserve existing status and approval)
      const emailObj = (allData[user] || []).find(e => e.postId === postId);
      if (emailObj) {
        emailObj.email.subject = subject;
        emailObj.email.body = body;
      }

      // Update the display with new content
      const previewEl = editForm.closest('.email-preview');
      const displayEl = previewEl.querySelector('.email-display');
      displayEl.querySelector('.email-subject').textContent = subject || '(no subject)';
      displayEl.querySelector('.email-body').textContent = body || '(no body)';

      // Remove edit form, show display and action buttons
      editForm.remove();
      displayEl.style.display = '';
      const actionDiv = previewEl.querySelector('.email-actions');
      if (actionDiv) actionDiv.style.display = '';
    } catch (err) {
      alert('Save failed: ' + err.message);
      btn.disabled = false;
      btn.textContent = 'Save';
    }
  };

  // ── Skip All Visible Posts ──
  window.handleSkipAll = async function() {
    const visiblePosts = postsData.filter(matchesPostFilter).filter(p => p.status !== 'skipped');
    if (visiblePosts.length === 0) {
      alert('No visible hiring posts to skip.');
      return;
    }
    if (!confirm(`Skip all ${visiblePosts.length} visible hiring posts?`)) return;

    const btn = document.getElementById('skipAllBtn');
    btn.disabled = true;
    btn.textContent = 'Skipping...';

    let failed = 0;
    for (const p of visiblePosts) {
      try {
        const res = await fetch('/api/posts/skip', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ postId: p.postId }),
        });
        if (res.ok) {
          p.status = 'skipped';
        } else {
          failed++;
        }
      } catch {
        failed++;
      }
    }

    if (failed > 0) alert(`${failed} post(s) failed to skip.`);

    btn.disabled = false;
    btn.textContent = 'Skip All Visible';
    renderStats();
    renderUserTabs();
    renderCards();
  };

    if (postsView) {
      filtersEl.innerHTML = `
        <button class="filter-btn ${postsStatusFilter === 'all' ? 'active' : ''}" data-pfilter="all">All</button>
        <button class="filter-btn ${postsStatusFilter === 'hiring' ? 'active' : ''}" data-pfilter="hiring">Hiring</button>
        <button class="filter-btn ${postsStatusFilter === 'skipped' ? 'active' : ''}" data-pfilter="skipped">Skipped</button>
        <select class="search-box" id="contactMethodFilter" style="flex:0;min-width:140px;cursor:pointer">
          <option value="">All Contacts</option>
          <option value="email" ${contactMethodFilter==='email'?'selected':''}>Email Only</option>
          <option value="dm" ${contactMethodFilter==='dm'?'selected':''}>DM Only</option>
        </select>
        <select class="search-box" id="jobTypeFilter" style="flex:0;min-width:130px;cursor:pointer">
          <option value="">All Types</option>
          <option value="full-time" ${jobTypeFilter==='full-time'?'selected':''}>Full-time</option>
          <option value="contract" ${jobTypeFilter==='contract'?'selected':''}>Contract</option>
          <option value="intern" ${jobTypeFilter==='intern'?'selected':''}>Intern</option>
          <option value="remote" ${jobTypeFilter==='remote'?'selected':''}>Remote</option>
        </select>
        <select class="search-box" id="salaryFilter" style="flex:0;min-width:140px;cursor:pointer">
          <option value="">All Salaries</option>
          <option value="6" ${salaryFilter==='6'?'selected':''}>6+ LPA</option>
          <option value="10" ${salaryFilter==='10'?'selected':''}>10+ LPA</option>
          <option value="15" ${salaryFilter==='15'?'selected':''}>15+ LPA</option>
          <option value="unknown" ${salaryFilter==='unknown'?'selected':''}>Not mentioned</option>
        </select>
        <input type="text" class="search-box" id="search" placeholder="Search by name, role, company..." value="${escapeHtml(searchQuery)}">
        <button class="btn-skip-all" id="skipAllBtn">Skip All Visible</button>
      `;
      filtersEl.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          postsStatusFilter = btn.dataset.pfilter;
          renderCards();
        });
      });
    } else {
      filtersEl.innerHTML = `
        <button class="filter-btn ${activeFilter==='all'?'active':''}" data-filter="all">All</button>
        <button class="filter-btn ${activeFilter==='drafted'?'active':''}" data-filter="drafted">Drafted</button>
        <button class="filter-btn ${activeFilter==='approved'?'active':''}" data-filter="approved">Approved</button>
        <button class="filter-btn ${activeFilter==='sent'?'active':''}" data-filter="sent">Sent</button>
        <button class="filter-btn ${activeFilter==='rejected'?'active':''}" data-filter="rejected">Rejected</button>
        <select class="search-box" id="contactMethodFilter" style="flex:0;min-width:140px;cursor:pointer">
          <option value="">All Contacts</option>
          <option value="email" ${contactMethodFilter==='email'?'selected':''}>Email Only</option>
          <option value="dm" ${contactMethodFilter==='dm'?'selected':''}>DM Only</option>
        </select>
        <select class="search-box" id="jobTypeFilter" style="flex:0;min-width:130px;cursor:pointer">
          <option value="">All Types</option>
          <option value="full-time" ${jobTypeFilter==='full-time'?'selected':''}>Full-time</option>
          <option value="contract" ${jobTypeFilter==='contract'?'selected':''}>Contract</option>
          <option value="intern" ${jobTypeFilter==='intern'?'selected':''}>Intern</option>
          <option value="remote" ${jobTypeFilter==='remote'?'selected':''}>Remote</option>
        </select>
        <select class="search-box" id="salaryFilter" style="flex:0;min-width:140px;cursor:pointer">
          <option value="">All Salaries</option>
          <option value="6" ${salaryFilter==='6'?'selected':''}>6+ LPA</option>
          <option value="10" ${salaryFilter==='10'?'selected':''}>10+ LPA</option>
          <option value="15" ${salaryFilter==='15'?'selected':''}>15+ LPA</option>
          <option value="unknown" ${salaryFilter==='unknown'?'selected':''}>Not mentioned</option>
        </select>
        <input type="text" class="search-box" id="search" placeholder="Search by name, role, company, email..." value="${escapeHtml(searchQuery)}">
      `;
      filtersEl.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeFilter = btn.dataset.filter;
          renderCards();
        });
      });
    }
    // Shared filter listeners
    document.getElementById('search').addEventListener('input', (e) => { searchQuery = e.target.value; renderCards(); });
    document.getElementById('jobTypeFilter').addEventListener('change', (e) => { jobTypeFilter = e.target.value; renderCards(); });
    document.getElementById('salaryFilter').addEventListener('change', (e) => { salaryFilter = e.target.value; renderCards(); });
    document.getElementById('contactMethodFilter').addEventListener('change', (e) => { contactMethodFilter = e.target.value; renderCards(); });

    // Skip All button (posts view only)
    const skipAllBtn = document.getElementById('skipAllBtn');
    if (skipAllBtn) {
      skipAllBtn.addEventListener('click', handleSkipAll);
    }
  }

  // Refresh button
  document.getElementById('refreshBtn').addEventListener('click', async () => {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    try {
      await fetchData();
      renderUserTabs();
      renderFilters();
      renderStats();
      renderCards();
    } catch (err) {
      alert('Refresh failed: ' + err.message);
    }
    btn.classList.remove('spinning');
  });

  // Send All button — always sends for configUser only
  document.getElementById('sendAllBtn').addEventListener('click', () => {
    const userEmails = (allData[configUser] || []).filter(e => e.status === 'approved' && !e.sentAt);
    if (userEmails.length === 0) {
      alert(`No approved unsent emails for ${configUser}.`);
      return;
    }
    if (!confirm(`Send ${userEmails.length} approved email(s) for ${configUser}? This will start sending immediately.`)) return;

    const btn = document.getElementById('sendAllBtn');
    const panel = document.getElementById('sendPanel');
    const log = document.getElementById('sendLog');

    btn.disabled = true;
    btn.textContent = 'Sending...';
    panel.classList.add('visible');
    log.innerHTML = '<p>Starting email sender...</p>';

    fetch('/api/send-emails', { method: 'POST' }).then(response => {
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      function read() {
        reader.read().then(({ done, value }) => {
          if (done) {
            btn.disabled = false;
            renderCards();
            fetchData().then(() => { renderStats(); renderCards(); });
            return;
          }
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                if (data.message) {
                  const p = document.createElement('p');
                  p.textContent = data.message;
                  log.appendChild(p);
                  log.scrollTop = log.scrollHeight;
                }
              } catch {}
            }
          }
          read();
        });
      }
      read();
    }).catch(err => {
      log.innerHTML += `<p style="color:var(--red)">Error: ${err.message}</p>`;
      btn.disabled = false;
      renderCards();
    });
  });

  document.getElementById('sendPanelMinimize').addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById('sendPanel').classList.add('minimized');
    document.getElementById('sendPanelMinimize').style.display = 'none';
    document.getElementById('sendPanelMaximize').style.display = '';
  });

  document.getElementById('sendPanelMaximize').addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById('sendPanel').classList.remove('minimized');
    document.getElementById('sendPanelMaximize').style.display = 'none';
    document.getElementById('sendPanelMinimize').style.display = '';
  });

  // ── Init ──
  async function init() {
    try {
      const cfgRes = await fetch('/api/config-user');
      const cfgData = await cfgRes.json();
      configUser = cfgData.name;
      await fetchData();
      renderUserTabs();
      renderFilters();
      renderStats();
      renderCards();
    } catch (err) {
      document.getElementById('subtitle').textContent = 'Failed to load data';
      document.getElementById('cards').innerHTML = `
        <div class="empty">
          <div class="empty-icon">&#9888;</div>
          <p>Could not connect to dashboard server</p>
          <p style="margin-top:8px;font-size:0.85rem">Make sure the server is running: <code style="color:var(--cyan)">npm run dashboard</code></p>
        </div>`;
    }
  }

  init();
})();
</script>
</body>
</html>
