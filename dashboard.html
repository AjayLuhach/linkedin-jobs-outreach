<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed Email Extractor — Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: #2a2a3d;
    --text: #e4e4ef;
    --text-dim: #8888a4;
    --accent: #7c5cfc;
    --accent-glow: #7c5cfc44;
    --green: #34d399;
    --green-dim: #34d39933;
    --red: #f87171;
    --red-dim: #f8717133;
    --yellow: #fbbf24;
    --yellow-dim: #fbbf2433;
    --cyan: #22d3ee;
    --cyan-dim: #22d3ee33;
    --pink: #f472b6;
    --pink-dim: #f472b633;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 20%, #7c5cfc08 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, #22d3ee06 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, #f472b604 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #7c5cfc, #22d3ee, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  .header p {
    color: var(--text-dim);
    margin-top: 8px;
    font-size: 0.95rem;
  }

  /* ── USER TABS ── */
  .user-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .user-tab {
    padding: 10px 24px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .user-tab:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .user-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .user-tab .tab-count {
    display: inline-block;
    margin-left: 8px;
    padding: 1px 7px;
    border-radius: 100px;
    font-size: 0.72rem;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    background: rgba(255,255,255,0.15);
  }

  .user-tab.active .tab-count {
    background: rgba(255,255,255,0.25);
  }

  /* ── STATS ROW ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }

  .stat-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 16px 16px 0 0;
  }

  .stat-card:nth-child(1)::before { background: linear-gradient(90deg, var(--accent), var(--cyan)); }
  .stat-card:nth-child(2)::before { background: linear-gradient(90deg, var(--green), var(--cyan)); }
  .stat-card:nth-child(3)::before { background: linear-gradient(90deg, var(--cyan), var(--accent)); }
  .stat-card:nth-child(4)::before { background: linear-gradient(90deg, var(--pink), var(--accent)); }
  .stat-card:nth-child(5)::before { background: linear-gradient(90deg, var(--yellow), var(--green)); }
  .stat-card:nth-child(6)::before { background: linear-gradient(90deg, var(--red), var(--pink)); }

  .stat-number {
    font-size: 2.2rem;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
  }

  .stat-label {
    font-size: 0.78rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 8px;
  }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 8px 20px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    padding: 8px 20px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-dim); }

  /* ── CONTACT CARDS ── */
  .cards {
    display: grid;
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 30px #7c5cfc11;
  }

  .card.rejected-card { opacity: 0.5; }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 20px 24px;
    cursor: pointer;
    user-select: none;
  }

  .score-ring {
    width: 56px; height: 56px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 1.1rem;
    flex-shrink: 0;
    position: relative;
  }

  .score-ring::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    padding: 3px;
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
  }

  .score-high { color: var(--green); background: var(--green-dim); }
  .score-high::before { background: linear-gradient(135deg, var(--green), var(--cyan)); }
  .score-mid { color: var(--yellow); background: var(--yellow-dim); }
  .score-mid::before { background: linear-gradient(135deg, var(--yellow), #fb923c); }
  .score-low { color: var(--red); background: var(--red-dim); }
  .score-low::before { background: linear-gradient(135deg, var(--red), var(--pink)); }

  .card-info { flex: 1; min-width: 0; }
  .card-info h3 { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .card-info .role { font-size: 0.85rem; color: var(--cyan); margin-bottom: 6px; }
  .card-info .reason { font-size: 0.8rem; color: var(--text-dim); line-height: 1.4; }

  .card-badges {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .badge {
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .badge-drafted { background: var(--accent-glow); color: var(--accent); border: 1px solid #7c5cfc44; }
  .badge-approved { background: var(--cyan-dim); color: var(--cyan); border: 1px solid #22d3ee44; }
  .badge-sent { background: var(--green-dim); color: var(--green); border: 1px solid #34d39944; }
  .badge-rejected { background: #44444466; color: #888; border: 1px solid #55555544; }
  .badge-no-email { background: var(--yellow-dim); color: var(--yellow); border: 1px solid #fbbf2444; }
  .badge-user { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }

  /* ── BUTTONS ── */
  .btn-approve {
    padding: 6px 16px;
    border-radius: 8px;
    border: 1px solid var(--green);
    background: var(--green-dim);
    color: var(--green);
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-approve:hover { background: var(--green); color: #000; }
  .btn-approve:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-approve.is-approved {
    border-color: var(--red);
    background: var(--red-dim);
    color: var(--red);
  }
  .btn-approve.is-approved:hover { background: var(--red); color: #000; }

  .btn-reject {
    padding: 6px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-reject:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }
  .btn-reject:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-restore {
    padding: 6px 16px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: var(--accent-glow);
    color: var(--accent);
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-restore:hover { background: var(--accent); color: #fff; }
  .btn-restore:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── EXPANDABLE DETAIL ── */
  .card-detail {
    display: none;
    border-top: 1px solid var(--border);
    padding: 0 24px 24px;
    animation: slideDown 0.2s ease;
  }

  .card.expanded .card-detail { display: block; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding-top: 20px;
  }

  @media (max-width: 768px) { .detail-grid { grid-template-columns: 1fr; } }

  .detail-section h4 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .detail-section h4::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .detail-section:nth-child(1) h4::before { background: var(--cyan); }
  .detail-section:nth-child(2) h4::before { background: var(--pink); }

  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 0.85rem;
    border-bottom: 1px solid #ffffff06;
  }

  .detail-row .label { color: var(--text-dim); }
  .detail-row .value { color: var(--text); font-weight: 500; text-align: right; }

  .reqs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }

  .req-tag {
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 0.75rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }

  .email-preview {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    grid-column: 1 / -1;
  }

  .email-preview .email-to {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--cyan);
    margin-bottom: 6px;
  }

  .email-preview .email-subject {
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text);
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .email-preview .email-body {
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.7;
    white-space: pre-wrap;
    font-family: 'Inter', sans-serif;
  }

  /* ── CHEVRON ── */
  .chevron {
    color: var(--text-dim);
    transition: transform 0.2s;
    flex-shrink: 0;
    align-self: center;
  }

  .card.expanded .chevron { transform: rotate(180deg); }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  /* ── COUNTER ── */
  .results-count {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 16px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── LOADING ── */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .refresh-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    z-index: 10;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  .refresh-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: scale(1.1);
  }

  .refresh-btn.spinning svg {
    animation: spin 0.8s linear infinite;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Feed Email Extractor</h1>
    <p id="subtitle">Loading...</p>
  </div>

  <div class="user-tabs" id="userTabs"></div>
  <div class="stats" id="stats"></div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="drafted">Drafted</button>
    <button class="filter-btn" data-filter="approved">Approved</button>
    <button class="filter-btn" data-filter="sent">Sent</button>
    <button class="filter-btn" data-filter="rejected">Rejected</button>
    <input type="text" class="search-box" id="search" placeholder="Search by name, role, company, email...">
  </div>

  <div class="results-count" id="resultsCount"></div>
  <div class="cards" id="cards">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Loading emails from sheet...</p>
    </div>
  </div>
</div>

<button class="refresh-btn" id="refreshBtn" title="Refresh data from sheet">
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
    <path d="M17 10a7 7 0 01-12.9 3.7M3 10a7 7 0 0112.9-3.7M17 10V4m0 6h-6M3 10v6m0-6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<script>
(() => {
  // ── State ──
  let allData = {};          // { username: [emails] }
  let users = [];
  let activeUser = null;     // null = "All Users"
  let activeFilter = 'all';
  let searchQuery = '';

  // ── Helpers ──
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function scoreClass(score) {
    if (score >= 8) return 'score-high';
    if (score >= 5) return 'score-mid';
    return 'score-low';
  }

  function statusBadge(status) {
    const s = (status || '').toLowerCase();
    if (s === 'sent') return '<span class="badge badge-sent">Sent</span>';
    if (s === 'approved') return '<span class="badge badge-approved">Approved</span>';
    if (s === 'rejected') return '<span class="badge badge-rejected">Rejected</span>';
    if (s === 'no_email') return '<span class="badge badge-no-email">No Email</span>';
    return '<span class="badge badge-drafted">Drafted</span>';
  }

  function postUrl(postId) {
    return postId ? `https://www.linkedin.com/feed/update/urn:li:activity:${postId}/` : null;
  }

  function getActiveEmails() {
    if (activeUser) return (allData[activeUser] || []).map(e => ({ ...e, _user: activeUser }));
    // All users merged
    const all = [];
    for (const [user, emails] of Object.entries(allData)) {
      for (const e of emails) all.push({ ...e, _user: user });
    }
    return all;
  }

  function matchesFilter(e) {
    const status = (e.status || 'drafted').toLowerCase();
    // Hide rejected from "all" unless filter is "rejected"
    if (status === 'rejected' && activeFilter !== 'rejected' && activeFilter !== 'all') return false;
    if (activeFilter !== 'all' && status !== activeFilter) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const haystack = [
        e.poster?.name, e.poster?.headline,
        e.job?.title, e.job?.company,
        e.email?.to, e.email?.subject,
        e.matchReason, e.requirements, e._user,
      ].filter(Boolean).join(' ').toLowerCase();
      return haystack.includes(q);
    }
    return true;
  }

  // ── Fetch Data ──
  async function fetchData() {
    const res = await fetch('/api/emails/all');
    const data = await res.json();
    allData = data.users || {};
    users = Object.keys(allData).sort();
  }

  // ── Render User Tabs ──
  function renderUserTabs() {
    const totalAll = Object.values(allData).reduce((s, e) => s + e.length, 0);
    let html = `<button class="user-tab ${!activeUser ? 'active' : ''}" data-user="">All Users<span class="tab-count">${totalAll}</span></button>`;
    for (const user of users) {
      const count = (allData[user] || []).length;
      html += `<button class="user-tab ${activeUser === user ? 'active' : ''}" data-user="${escapeHtml(user)}">${escapeHtml(user)}<span class="tab-count">${count}</span></button>`;
    }
    document.getElementById('userTabs').innerHTML = html;

    document.querySelectorAll('.user-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeUser = btn.dataset.user || null;
        renderUserTabs();
        renderStats();
        renderCards();
      });
    });
  }

  // ── Render Stats ──
  function renderStats() {
    const emails = getActiveEmails();
    const total = emails.length;
    const drafted = emails.filter(e => (e.status || 'drafted') === 'drafted').length;
    const approved = emails.filter(e => e.status === 'approved').length;
    const sent = emails.filter(e => e.status === 'sent').length;
    const rejected = emails.filter(e => e.status === 'rejected').length;
    const avgScore = total ? (emails.reduce((s, e) => s + (e.score || 0), 0) / total).toFixed(1) : '0';

    document.getElementById('stats').innerHTML = `
      <div class="stat-card">
        <div class="stat-number" style="color:var(--accent)">${total}</div>
        <div class="stat-label">Total Emails</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="color:var(--pink)">${drafted}</div>
        <div class="stat-label">Drafted</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="color:var(--cyan)">${approved}</div>
        <div class="stat-label">Approved</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="color:var(--green)">${sent}</div>
        <div class="stat-label">Sent</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="color:var(--red)">${rejected}</div>
        <div class="stat-label">Rejected</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="color:var(--yellow)">${avgScore}</div>
        <div class="stat-label">Avg Score</div>
      </div>
    `;

    const label = activeUser || 'All users';
    document.getElementById('subtitle').textContent = `${total} emails for ${label}`;
  }

  // ── Render Cards ──
  function bestStatus(entries) {
    const order = ['approved', 'drafted', 'sent', 'no_email', 'rejected'];
    for (const s of order) {
      if (entries.some(e => (e.status || 'drafted') === s)) return s;
    }
    return 'drafted';
  }

  function renderCards() {
    const emails = getActiveEmails().filter(matchesFilter);

    const total = getActiveEmails().length;

    if (emails.length === 0) {
      document.getElementById('resultsCount').textContent = `0 of ${total} emails`;
      document.getElementById('cards').innerHTML = `
        <div class="empty">
          <div class="empty-icon">&#9788;</div>
          <p>No emails match your filters</p>
        </div>`;
      return;
    }

    // When showing all users, group by post ID — one card per post with all users' drafts inside
    if (!activeUser && users.length > 1) {
      const byPost = new Map();
      for (const e of emails) {
        const pid = e.postId || '';
        if (!byPost.has(pid)) byPost.set(pid, []);
        byPost.get(pid).push(e);
      }

      // Sort posts: best status first, then highest score
      const statusOrder = { drafted: 0, approved: 1, sent: 2, rejected: 3, no_email: 4 };
      const posts = [...byPost.entries()].sort((a, b) => {
        const sa = statusOrder[bestStatus(a[1])] ?? 5;
        const sb = statusOrder[bestStatus(b[1])] ?? 5;
        if (sa !== sb) return sa - sb;
        const maxA = Math.max(...a[1].map(e => e.score || 0));
        const maxB = Math.max(...b[1].map(e => e.score || 0));
        return maxB - maxA;
      });

      document.getElementById('resultsCount').textContent = `${posts.length} posts (${emails.length} emails across ${users.length} users)`;
      document.getElementById('cards').innerHTML = posts.map(([pid, entries]) => renderGroupedCard(pid, entries)).join('');
      return;
    }

    // Single user view — one card per email, sorted by status then score
    const statusOrder = { drafted: 0, approved: 1, sent: 2, rejected: 3, no_email: 4 };
    emails.sort((a, b) => {
      const sa = statusOrder[(a.status || 'drafted')] ?? 5;
      const sb = statusOrder[(b.status || 'drafted')] ?? 5;
      if (sa !== sb) return sa - sb;
      return (b.score || 0) - (a.score || 0);
    });

    document.getElementById('resultsCount').textContent = `${emails.length} of ${total} emails`;
    document.getElementById('cards').innerHTML = emails.map(renderSingleCard).join('');
  }

  // Card for "All Users" view — one card per post, multiple user drafts inside
  function renderGroupedCard(postId, entries) {
    const first = entries[0];
    const maxScore = Math.max(...entries.map(e => e.score || 0));
    const reqs = (first.requirements || '').split(',').map(s => s.trim()).filter(Boolean);
    const allRejected = entries.every(e => (e.status || 'drafted') === 'rejected');

    // Status summary badges
    const statuses = {};
    for (const e of entries) { const s = e.status || 'drafted'; statuses[s] = (statuses[s] || 0) + 1; }

    return `
    <div class="card${allRejected ? ' rejected-card' : ''}" data-postid="${escapeHtml(postId)}">
      <div class="card-top" onclick="this.parentElement.classList.toggle('expanded')">
        <div class="score-ring ${scoreClass(maxScore)}">${maxScore}</div>
        <div class="card-info">
          <h3>${escapeHtml(first.poster?.name || 'Unknown')}</h3>
          <div class="role">${escapeHtml(first.job?.title || 'Unknown Role')}${first.job?.company ? ' @ ' + escapeHtml(first.job.company) : ''}</div>
          <div class="reason">${escapeHtml(first.matchReason || '')}</div>
        </div>
        <div class="card-badges">
          ${entries.map(e => `<span class="badge badge-user">${escapeHtml(e._user)}</span>`).join('')}
          ${Object.entries(statuses).map(([s, n]) => statusBadge(s)).join('')}
        </div>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-detail">
        <div class="detail-grid">
          <div class="detail-section">
            <h4>Job Details</h4>
            <div class="detail-row"><span class="label">Title</span><span class="value">${escapeHtml(first.job?.title || '—')}</span></div>
            <div class="detail-row"><span class="label">Company</span><span class="value">${escapeHtml(first.job?.company || '—')}</span></div>
            <div class="detail-row"><span class="label">Poster</span><span class="value">${escapeHtml(first.poster?.headline || '—')}</span></div>
            ${reqs.length ? `<div style="margin-top:8px"><div class="reqs">${reqs.map(r => `<span class="req-tag">${escapeHtml(r)}</span>`).join('')}</div></div>` : ''}
          </div>
          <div class="detail-section">
            <h4>Post Info</h4>
            <div class="detail-row"><span class="label">Users</span><span class="value">${entries.map(e => escapeHtml(e._user)).join(', ')}</span></div>
            <div class="detail-row"><span class="label">Post</span><span class="value">${postId ? `<a href="${postUrl(postId)}" target="_blank" rel="noopener" style="color:var(--cyan);text-decoration:none;font-family:JetBrains Mono,monospace;font-size:0.75rem" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">View on LinkedIn</a>` : '—'}</span></div>
          </div>
          ${entries.map(e => renderUserEmailBlock(e)).join('')}
        </div>
      </div>
    </div>`;
  }

  // Per-user email block inside a grouped card
  function renderUserEmailBlock(e) {
    const status = (e.status || 'drafted').toLowerCase();
    const isRejected = status === 'rejected';
    const isSent = status === 'sent';
    const isApproved = status === 'approved';
    const hasEmail = e.email?.to && e.email.to.includes('@');

    return `
    <div class="email-preview" style="position:relative">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span class="badge badge-user" style="font-size:0.8rem;padding:4px 14px">${escapeHtml(e._user)}</span>
        ${statusBadge(status)}
        <span style="color:var(--text-dim);font-size:0.78rem;font-family:JetBrains Mono,monospace;margin-left:auto">Score: ${e.score || 0}/10</span>
      </div>
      ${hasEmail ? `
        <div class="email-to">To: ${escapeHtml(e.email.to)}</div>
        <div class="email-subject">${escapeHtml(e.email.subject || '(no subject)')}</div>
        <div class="email-body">${escapeHtml(e.email.body || '(no body)')}</div>
      ` : `<div style="color:var(--yellow);font-size:0.85rem">No email drafted</div>`}
      ${e.approvedBy ? `<div style="font-size:0.75rem;color:var(--cyan);margin-top:8px">Approved by: ${escapeHtml(e.approvedBy)}</div>` : ''}
      ${e.sentAt ? `<div style="font-size:0.75rem;color:var(--green);margin-top:4px">Sent: ${new Date(e.sentAt).toLocaleString()}</div>` : ''}
      ${!isSent ? `<div style="margin-top:14px;display:flex;align-items:center;gap:12px">
        ${!isRejected ? `
          <button class="btn-approve ${isApproved ? 'is-approved' : ''}" onclick="handleApprove(event, '${escapeHtml(e._user)}', '${escapeHtml(e.postId)}', ${isApproved})">
            ${isApproved ? 'Unapprove' : 'Approve'}
          </button>
          <button class="btn-reject" onclick="handleReject(event, '${escapeHtml(e._user)}', '${escapeHtml(e.postId)}')">Reject</button>
        ` : `
          <button class="btn-restore" onclick="handleRestore(event, '${escapeHtml(e._user)}', '${escapeHtml(e.postId)}')">Restore</button>
        `}
      </div>` : ''}
    </div>`;
  }

  // Card for single user view
  function renderSingleCard(e) {
    const status = (e.status || 'drafted').toLowerCase();
    const isRejected = status === 'rejected';
    const isSent = status === 'sent';
    const isApproved = status === 'approved';
    const hasEmail = e.email?.to && e.email.to.includes('@');
    const reqs = (e.requirements || '').split(',').map(s => s.trim()).filter(Boolean);

    return `
    <div class="card${isRejected ? ' rejected-card' : ''}" data-user="${escapeHtml(e._user)}" data-postid="${escapeHtml(e.postId)}">
      <div class="card-top" onclick="this.parentElement.classList.toggle('expanded')">
        <div class="score-ring ${scoreClass(e.score || 0)}">${e.score || 0}</div>
        <div class="card-info">
          <h3>${escapeHtml(e.poster?.name || 'Unknown')}</h3>
          <div class="role">${escapeHtml(e.job?.title || 'Unknown Role')}${e.job?.company ? ' @ ' + escapeHtml(e.job.company) : ''}</div>
          <div class="reason">${escapeHtml(e.matchReason || '')}</div>
        </div>
        <div class="card-badges">
          ${statusBadge(status)}
        </div>
        <svg class="chevron" width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="card-detail">
        <div class="detail-grid">
          <div class="detail-section">
            <h4>Job Details</h4>
            <div class="detail-row"><span class="label">Title</span><span class="value">${escapeHtml(e.job?.title || '—')}</span></div>
            <div class="detail-row"><span class="label">Company</span><span class="value">${escapeHtml(e.job?.company || '—')}</span></div>
            <div class="detail-row"><span class="label">Poster</span><span class="value">${escapeHtml(e.poster?.headline || '—')}</span></div>
            ${reqs.length ? `<div style="margin-top:8px"><div class="reqs">${reqs.map(r => `<span class="req-tag">${escapeHtml(r)}</span>`).join('')}</div></div>` : ''}
          </div>
          <div class="detail-section">
            <h4>Status</h4>
            <div class="detail-row"><span class="label">Status</span><span class="value">${escapeHtml(status)}</span></div>
            ${e.approvedBy ? `<div class="detail-row"><span class="label">Approved By</span><span class="value" style="color:var(--cyan)">${escapeHtml(e.approvedBy)}</span></div>` : ''}
            ${e.generatedAt ? `<div class="detail-row"><span class="label">Generated</span><span class="value">${new Date(e.generatedAt).toLocaleString()}</span></div>` : ''}
            ${e.sentAt ? `<div class="detail-row"><span class="label">Sent At</span><span class="value" style="color:var(--green)">${new Date(e.sentAt).toLocaleString()}</span></div>` : ''}
            <div class="detail-row"><span class="label">Post</span><span class="value">${e.postId ? `<a href="${postUrl(e.postId)}" target="_blank" rel="noopener" style="color:var(--cyan);text-decoration:none;font-family:JetBrains Mono,monospace;font-size:0.75rem" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">View on LinkedIn</a>` : '—'}</span></div>
          </div>
          ${hasEmail ? `
          <div class="email-preview">
            <div class="email-to">To: ${escapeHtml(e.email.to)}</div>
            <div class="email-subject">${escapeHtml(e.email.subject || '(no subject)')}</div>
            <div class="email-body">${escapeHtml(e.email.body || '(no body)')}</div>
            ${!isSent ? `<div style="margin-top:14px;display:flex;align-items:center;gap:12px">
              ${!isRejected ? `
                <button class="btn-approve ${isApproved ? 'is-approved' : ''}" onclick="handleApprove(event, '${escapeHtml(e._user)}', '${escapeHtml(e.postId)}', ${isApproved})">
                  ${isApproved ? 'Unapprove' : 'Approve'}
                </button>
                <button class="btn-reject" onclick="handleReject(event, '${escapeHtml(e._user)}', '${escapeHtml(e.postId)}')">Reject</button>
              ` : `
                <button class="btn-restore" onclick="handleRestore(event, '${escapeHtml(e._user)}', '${escapeHtml(e.postId)}')">Restore</button>
              `}
            </div>` : ''}
          </div>` : `
          <div style="grid-column:1/-1;padding:12px 0">
            ${!isSent && !isRejected ? `
              <button class="btn-reject" onclick="handleReject(event, '${escapeHtml(e._user)}', '${escapeHtml(e.postId)}')">Reject</button>
            ` : ''}
            ${isRejected ? `
              <button class="btn-restore" onclick="handleRestore(event, '${escapeHtml(e._user)}', '${escapeHtml(e.postId)}')">Restore</button>
            ` : ''}
          </div>`}
        </div>
      </div>
    </div>`;
  }

  // ── In-place DOM update helpers ──
  function updateCardStatusInPlace(btn, user, postId, newStatus) {
    const cardEl = btn.closest('.card');
    const previewEl = btn.closest('.email-preview');
    const now = new Date();

    // Update status badge in card-top (single card view)
    if (cardEl) {
      const cardBadges = cardEl.querySelector('.card-top .card-badges');
      if (cardBadges) {
        const oldBadge = cardBadges.querySelector('.badge:not(.badge-user)');
        if (oldBadge) oldBadge.outerHTML = statusBadge(newStatus);
      }
      // Update rejected-card opacity
      if (newStatus === 'rejected') cardEl.classList.add('rejected-card');
      else cardEl.classList.remove('rejected-card');
    }

    // Update status badge inside email-preview header (grouped view)
    if (previewEl) {
      const headerDiv = previewEl.children[0];
      if (headerDiv) {
        const oldBadge = headerDiv.querySelector('.badge:not(.badge-user)');
        if (oldBadge) oldBadge.outerHTML = statusBadge(newStatus);
      }
    }

    // Rebuild the action area
    const actionDiv = btn.closest('div[style*="margin-top"]');
    if (!actionDiv) return;

    const eu = escapeHtml(user);
    const ep = escapeHtml(postId);

    if (newStatus === 'approved') {
      actionDiv.innerHTML = `
        <button class="btn-approve is-approved" onclick="handleApprove(event, '${eu}', '${ep}', true)">Unapprove</button>
        <button class="btn-reject" onclick="handleReject(event, '${eu}', '${ep}')">Reject</button>
        <span style="color:var(--cyan);font-size:0.75rem;margin-left:auto;font-family:JetBrains Mono,monospace">Approved: ${now.toLocaleString()}</span>
      `;
    } else if (newStatus === 'rejected') {
      actionDiv.innerHTML = `
        <button class="btn-restore" onclick="handleRestore(event, '${eu}', '${ep}')">Restore</button>
        <span style="color:var(--red);font-size:0.75rem;margin-left:auto;font-family:JetBrains Mono,monospace">Rejected: ${now.toLocaleString()}</span>
      `;
    } else {
      // drafted
      actionDiv.innerHTML = `
        <button class="btn-approve" onclick="handleApprove(event, '${eu}', '${ep}', false)">Approve</button>
        <button class="btn-reject" onclick="handleReject(event, '${eu}', '${ep}')">Reject</button>
      `;
    }
  }

  // ── API Actions ──
  window.handleApprove = async function(event, user, postId, isCurrentlyApproved) {
    event.stopPropagation();
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = '...';

    try {
      const endpoint = isCurrentlyApproved ? '/api/unapprove' : '/api/approve';
      const body = isCurrentlyApproved
        ? { user, postId }
        : { user, postId, approvedBy: 'Dashboard' };
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      const newStatus = isCurrentlyApproved ? 'drafted' : 'approved';

      // Update local state
      const emailObj = (allData[user] || []).find(e => e.postId === postId);
      if (emailObj) {
        emailObj.status = newStatus;
        emailObj.approvedBy = isCurrentlyApproved ? '' : 'Dashboard';
      }

      // Update stats/tabs but keep cards in place
      renderStats();
      renderUserTabs();

      // In-place card update
      updateCardStatusInPlace(btn, user, postId, newStatus);
    } catch (err) {
      alert('Failed: ' + err.message);
      btn.disabled = false;
      btn.textContent = isCurrentlyApproved ? 'Unapprove' : 'Approve';
    }
  };

  window.handleReject = async function(event, user, postId) {
    event.stopPropagation();
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = '...';

    try {
      const res = await fetch('/api/reject', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user, postId }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      const emailObj = (allData[user] || []).find(e => e.postId === postId);
      if (emailObj) {
        emailObj.status = 'rejected';
        emailObj.approvedBy = '';
      }

      renderStats();
      renderUserTabs();

      // In-place card update
      updateCardStatusInPlace(btn, user, postId, 'rejected');
    } catch (err) {
      alert('Failed: ' + err.message);
      btn.disabled = false;
      btn.textContent = 'Reject';
    }
  };

  window.handleRestore = async function(event, user, postId) {
    event.stopPropagation();
    const btn = event.target;
    btn.disabled = true;
    btn.textContent = '...';

    try {
      const res = await fetch('/api/unapprove', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user, postId }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);

      const emailObj = (allData[user] || []).find(e => e.postId === postId);
      if (emailObj) {
        emailObj.status = 'drafted';
        emailObj.approvedBy = '';
      }

      renderStats();
      renderUserTabs();

      // In-place card update
      updateCardStatusInPlace(btn, user, postId, 'drafted');
    } catch (err) {
      alert('Failed: ' + err.message);
      btn.disabled = false;
      btn.textContent = 'Restore';
    }
  };

  // ── Event Listeners ──
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderCards();
    });
  });

  document.getElementById('search').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    renderCards();
  });

  // Refresh button
  document.getElementById('refreshBtn').addEventListener('click', async () => {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    try {
      await fetchData();
      renderUserTabs();
      renderStats();
      renderCards();
    } catch (err) {
      alert('Refresh failed: ' + err.message);
    }
    btn.classList.remove('spinning');
  });

  // ── Init ──
  async function init() {
    try {
      await fetchData();
      renderUserTabs();
      renderStats();
      renderCards();
    } catch (err) {
      document.getElementById('subtitle').textContent = 'Failed to load data';
      document.getElementById('cards').innerHTML = `
        <div class="empty">
          <div class="empty-icon">&#9888;</div>
          <p>Could not connect to dashboard server</p>
          <p style="margin-top:8px;font-size:0.85rem">Make sure the server is running: <code style="color:var(--cyan)">npm run dashboard</code></p>
        </div>`;
    }
  }

  init();
})();
</script>
</body>
</html>
